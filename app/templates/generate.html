{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Generate Presentation Icons</h1>
    <p class="muted">Choose a pre-approved style and enter only the metaphor you need.</p>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/generate" class="stack" id="generate-form">
        <label>Icon metaphor</label>
        <input type="text" name="metaphor" placeholder="e.g. growth, teamwork, risk shield" required />

        <label>Style preset</label>
        <select name="style_id" required>
            {% for style in styles %}
            <option value="{{ style.id }}">{{ style.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" id="generate-submit">Generate Icon</button>
        <div id="generate-progress" class="generate-progress hidden" role="status" aria-live="polite">
            <div class="progress-track">
                <span class="progress-indeterminate"></span>
            </div>
            <p class="muted">Generating icon, please wait...</p>
        </div>
    </form>
</section>

{% if result_path %}
<section class="card">
    <h2>Result</h2>
    <div class="result">
        <img src="{{ result_path }}" alt="Generated icon" />
    </div>
    <p><a href="{{ result_path }}" download>Download PNG</a></p>
</section>
{% endif %}
<script>
    (() => {
        const form = document.getElementById("generate-form");
        const submitButton = document.getElementById("generate-submit");
        const progress = document.getElementById("generate-progress");
        if (!form || !submitButton || !progress) {
            return;
        }
        form.addEventListener("submit", () => {
            submitButton.disabled = true;
            submitButton.textContent = "Generating...";
            progress.classList.remove("hidden");
        });
    })();
</script>
{% endblock %}
