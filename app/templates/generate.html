{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Generate Presentation Icons</h1>
    <p class="muted">Choose a pre-approved style and enter only the metaphor you need.</p>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="/generate" class="stack">
        <label>Icon metaphor</label>
        <input type="text" name="metaphor" placeholder="e.g. growth, teamwork, risk shield" required />

        <label>Style preset</label>
        <select name="style_id" required>
            {% for style in styles %}
            <option value="{{ style.id }}">{{ style.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Generate Icon</button>
    </form>
</section>

{% if result_path %}
<section class="card">
    <h2>Result</h2>
    <div class="result">
        <img src="{{ result_path }}" alt="Generated icon" />
    </div>
    <p><a href="{{ result_path }}" download>Download PNG</a></p>
</section>
{% endif %}
{% endblock %}
