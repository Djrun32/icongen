services:
  icongen:
    build: .
    container_name: intranet-icongen
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/static/generated:/srv/icongen/app/static/generated
      - ./data:/srv/icongen/data
    environment:
      - DATABASE_URL=sqlite:///./data/icongen.db
